# Configuration for Stale Bot
# Automatically closes stale issues and pull requests

# Number of days of inactivity before an issue or PR becomes stale
daysUntilStale: 60

# Number of days of inactivity before a stale issue or PR is closed
daysUntilClose: 7

# Issues with these labels will never be considered stale
exemptLabels:
  - pinned
  - security
  - good first issue
  - help wanted

# Set to true to ignore issues in a project (defaults to false)
exemptProjects: false

# Set to true to ignore issues in a milestone (defaults to false)
exemptMilestones: false

# Set to true to ignore issues with an assignee (defaults to false)
exemptAssignees: false

# Label to use when marking as stale
staleLabel: stale

# Comment to post when marking as stale. Set to `false` to disable
markComment: >
  This issue has been automatically marked as stale because it has not had
  recent activity. It will be closed if no further activity occurs within 7 days.
  Thank you for your contributions.

# Comment to post when removing the stale label. Set to `false` to disable
unmarkComment: false

# Comment to post when closing a stale issue. Set to `false` to disable
closeComment: >
  This issue has been automatically closed due to inactivity. If you believe
  this is still relevant, please feel free to reopen it or create a new issue.

# Limit the number of actions per hour, from 1-30. Default is 30
operationsPerRun: 30

# Set to true to enable stale issue detection
enableIssues: true

# Set to true to enable stale pull request detection
enablePullRequests: true

# Optionally, specify configuration for issues only
issues:
  # Number of days of inactivity before an issue becomes stale
  daysUntilStale: 60
  # Number of days of inactivity before a stale issue is closed
  daysUntilClose: 7

# Optionally, specify configuration for pull requests only
pullRequests:
  # Number of days of inactivity before a PR becomes stale
  daysUntilStale: 30
  # Number of days of inactivity before a stale PR is closed
  daysUntilClose: 3
  # Comment to post when marking a PR as stale
  markComment: >
    This pull request has been automatically marked as stale because it has not had
    recent activity. It will be closed if no further activity occurs within 3 days.
    Thank you for your contributions.

